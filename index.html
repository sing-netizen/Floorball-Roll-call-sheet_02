<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>軟式曲棍球技術改良訓練班 - 網上點名系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
        }
        body {
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 20px 24px 32px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            color: #1e2a3e;
            font-weight: 600;
            border-left: 5px solid #2c7da0;
            padding-left: 18px;
        }
        .sub {
            color: #2c3e50;
            margin-bottom: 24px;
            font-size: 0.95rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
            margin-top: 8px;
            padding-left: 23px;
        }
        .info-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 24px;
            margin-bottom: 28px;
            border: 1px solid #e2edf2;
        }
        .info-item {
            flex: 1;
            min-width: 160px;
        }
        .info-item label {
            font-weight: 600;
            display: block;
            font-size: 0.8rem;
            color: #2c7da0;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        select, input[type="date"] {
            width: 100%;
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 28px 0 16px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid #cbdff2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e9eef3;
            background: white;
            margin-bottom: 28px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 700px;
        }
        th {
            background: #eef3fa;
            padding: 14px 8px;
            text-align: center;
            font-weight: 600;
            color: #1f4e6e;
            border-bottom: 1px solid #d4e0e9;
        }
        td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid #eef2f6;
            vertical-align: middle;
        }
        .org-cell, .name-cell {
            text-align: left;
            font-weight: 500;
        }
        .status-select {
            padding: 6px 8px;
            border-radius: 40px;
            font-size: 0.8rem;
            background-color: white;
            border: 1px solid #cbd5e1;
            width: 100px;
            text-align: center;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 16px;
            margin: 28px 0 20px;
        }
        .btn {
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            background: #eef2f9;
            color: #1e3a5f;
        }
        .btn-primary {
            background: #2c7da0;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-primary:hover {
            background: #1f5e7a;
            transform: translateY(-1px);
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
        }
        .btn-whatsapp:hover {
            background: #1da851;
        }
        .preview-area {
            background: #fefce8;
            border: 1px solid #fde047;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .preview-title {
            font-weight: 700;
            color: #854d0e;
        }
        .whatsapp-message {
            background: #fff;
            border-radius: 20px;
            padding: 16px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #e2e8f0;
            max-height: 400px;
            overflow-y: auto;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 28px;
            color: #5f6c7a;
        }
        .badge-emoji {
            font-size: 1rem;
            display: inline-block;
            margin-right: 4px;
        }
        select option {
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🏑 軟式曲棍球技術改良訓練班</h1>
    <div class="sub">📍 九龍灣體育館 · 點名系統</div>

    <!-- 基本資訊列 -->
    <div class="info-bar">
        <div class="info-item">
            <label>📅 訓練日期</label>
            <input type="date" id="sessionDate" value="2026-03-27">
        </div>
        <div class="info-item">
            <label>⏰ 時間</label>
            <select id="sessionTime">
                <option value="星期一 (18:00-20:00)">星期一 (18:00-20:00)</option>
                <option value="星期六 (18:00-20:00)" selected>星期六 (18:00-20:00)</option>
            </select>
        </div>
        <div class="info-item">
            <label>🏟️ 地點</label>
            <select id="venueSelect">
                <option value="九龍灣體育館" selected>九龍灣體育館</option>
            </select>
        </div>
        <div class="info-item">
            <label>🧑‍🏫 負責教練組合</label>
            <select id="coachSelect">
                <option value="彭家威、何昌恆">彭家威、何昌恆</option>
                <option value="彭家威">彭家威</option>
                <option value="何昌恆">何昌恆</option>
            </select>
        </div>
    </div>

    <!-- 運動員表 (含機構+性別) -->
    <div class="section-title">👥 運動員名單</div>
    <div class="table-wrapper">
        <table id="athleteTable">
            <thead>
                <tr><th>#</th><th>機構名稱</th><th>姓名</th><th>性別</th><th>出席狀態</th></tr>
            </thead>
            <tbody id="athleteTbody"></tbody>
        </table>
    </div>

    <!-- 跟操運動員 -->
    <div class="section-title">🏃 跟操運動員</div>
    <div class="table-wrapper">
        <table id="trialTable">
            <thead><tr><th>#</th><th>機構名稱</th><th>姓名</th><th>性別</th><th>出席狀態</th></tr></thead>
            <tbody id="trialTbody"></tbody>
        </table>
    </div>

    <!-- 融合伙伴 -->
    <div class="section-title">🤝 融合伙伴</div>
    <div class="table-wrapper">
        <table id="partnerTable">
            <thead><tr><th>#</th><th>機構名稱</th><th>姓名</th><th>性別</th><th>出席狀態</th></tr></thead>
            <tbody id="partnerTbody"></tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="btn" id="resetDefaultBtn">↺ 重設預設狀態</button>
        <button class="btn btn-primary" id="generateMsgBtn">📋 生成WhatsApp文案</button>
        <button class="btn btn-whatsapp" id="whatsappSendBtn">📱 傳送至 WhatsApp</button>
    </div>

    <!-- 文案預覽區 -->
    <div class="preview-area">
        <div class="preview-header">
            <span class="preview-title">✉️ WhatsApp 推送文案預覽</span>
            <span style="font-size:12px;">點擊下方按鈕可一鍵傳送</span>
        </div>
        <div id="whatsappPreview" class="whatsapp-message">點選「生成WhatsApp文案」或直接點傳送按鈕⋯</div>
    </div>
    <footer>此記錄由點名系統自動生成</footer>
</div>

<script>
    // ---------- 原始數據定義 (含機構名稱 + 性別) ----------
    // 運動員名單 (1~13)
    const athletesRaw = [
        { org: "特奧之友", name: "羅翹鋒", gender: "M" },
        { org: "松嶺職訓", name: "陳卓謙", gender: "M" },
        { org: "觀塘展亮", name: "林日朗", gender: "M" },
        { org: "循道衛理", name: "李浩生", gender: "M" },
        { org: "特奧之友", name: "陳文輝", gender: "M" },
        { org: "特奧之友", name: "陳文傑", gender: "M" },
        { org: "特奧之友", name: "李穎駿", gender: "M" },
        { org: "特奧之友", name: "呂家華", gender: "M" },
        { org: "特奧之友", name: "林志忠", gender: "M" },
        { org: "特奧之友", name: "曹俊業", gender: "M" },
        { org: "特奧之友", name: "何子鵬", gender: "M" },
        { org: "沙田公立", name: "吳國浩", gender: "M" },
        { org: "西區晨輝", name: "石振星", gender: "M" }
    ];
    // 跟操運動員 (14)
    const trialsRaw = [
        { org: "啟愛", name: "鄧梓謙", gender: "M" }
    ];
    // 融合伙伴 (原編號16~20, 但有重複編號19更正，依原始修正)
    const partnersRaw = [
        { org: "融合伙伴", name: "陳考熒", gender: "F" },
        { org: "融合伙伴", name: "麥偉俊", gender: "M" },
        { org: "融合伙伴", name: "陳芯儀", gender: "F" },
        { org: "融合伙伴", name: "江韻荍", gender: "F" },
        { org: "融合伙伴", name: "夏仲文", gender: "F" },   // 原始清單性別F
        { org: "融合伙伴", name: "黃展悅", gender: "F" }
    ];

    // 出席狀態選項 (值 -> 顯示文字 + emoji)
    const statusOptions = [
        { value: "Yes", label: "✅ Yes 出席", emoji: "✅" },
        { value: "Abs", label: "❌ Abs 請假", emoji: "❌" },
        { value: "O",   label: "⚠️ O 無故缺席", emoji: "⚠️" },
        { value: "L",   label: "⏰ L 遲到", emoji: "⏰" },
        { value: "S",   label: "🤒 S 病假", emoji: "🤒" },
        { value: "C",   label: "🏆 C 出外比賽", emoji: "🏆" }
    ];

    // 將選單轉成html string (保留value)
    function buildStatusSelect(currentValue) {
        let html = `<select class="status-select" data-status-field>`;
        for (let opt of statusOptions) {
            let selected = (opt.value === currentValue) ? 'selected' : '';
            html += `<option value="${opt.value}" ${selected}>${opt.emoji} ${opt.label.slice(opt.label.indexOf(' ')+1)}</option>`;
        }
        html += `</select>`;
        return html;
    }

    // 儲存狀態 (用於各列表)
    let athleteStatus = new Array(athletesRaw.length).fill("Yes");
    let trialStatus = new Array(trialsRaw.length).fill("Yes");
    let partnerStatus = new Array(partnersRaw.length).fill("Yes");

    // 渲染表格
    function renderTables() {
        // 運動員表格
        const athleteTbody = document.getElementById('athleteTbody');
        athleteTbody.innerHTML = '';
        athletesRaw.forEach((item, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${idx+1}</td>
                <td class="org-cell">${item.org}</td>
                <td class="name-cell">${item.name}</td>
                <td>${item.gender === 'M' ? '男 M' : (item.gender === 'F' ? '女 F' : item.gender)}</td>
                <td class="status-td">${buildStatusSelect(athleteStatus[idx])}</td>
            `;
            athleteTbody.appendChild(tr);
        });
        // 綁定事件
        document.querySelectorAll('#athleteTbody .status-select').forEach((sel, idx) => {
            sel.addEventListener('change', (e) => { athleteStatus[idx] = e.target.value; });
        });

        // 跟操
        const trialTbody = document.getElementById('trialTbody');
        trialTbody.innerHTML = '';
        trialsRaw.forEach((item, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${idx+1}</td>
                <td class="org-cell">${item.org}</td>
                <td>${item.name}</td>
                <td>${item.gender === 'M' ? '男 M' : '女 F'}</td>
                <td>${buildStatusSelect(trialStatus[idx])}</td>
            `;
            trialTbody.appendChild(tr);
        });
        document.querySelectorAll('#trialTbody .status-select').forEach((sel, idx) => {
            sel.addEventListener('change', (e) => { trialStatus[idx] = e.target.value; });
        });

        // 融合伙伴
        const partnerTbody = document.getElementById('partnerTbody');
        partnerTbody.innerHTML = '';
        partnersRaw.forEach((item, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${idx+1}</td>
                <td class="org-cell">${item.org}</td>
                <td>${item.name}</td>
                <td>${item.gender === 'M' ? '男 M' : '女 F'}</td>
                <td>${buildStatusSelect(partnerStatus[idx])}</td>
            `;
            partnerTbody.appendChild(tr);
        });
        document.querySelectorAll('#partnerTbody .status-select').forEach((sel, idx) => {
            sel.addEventListener('change', (e) => { partnerStatus[idx] = e.target.value; });
        });
    }

    // 取得對應狀態的emoji文字 (用於文案)
    function getStatusEmojiAndText(statusValue) {
        const found = statusOptions.find(opt => opt.value === statusValue);
        if (found) return `${found.emoji} ${found.label.split(' ').slice(1).join(' ')}`;
        return statusValue;
    }

    // 生成完整whatsapp文案 (包含日期、時間、地點、教練、所有名單及生成時間)
    function generateWhatsAppText() {
        const dateObj = document.getElementById('sessionDate').value;
        const timeVal = document.getElementById('sessionTime').value;
        const venue = document.getElementById('venueSelect').value;
        const coach = document.getElementById('coachSelect').value;

        // 格式化日期顯示 (YYYY-MM-DD -> 年月日)
        const displayDate = dateObj ? dateObj.replace(/-/g, '/') : '未設定日期';
        
        // 構建標題
        let msg = `🏑 軟式曲棍球技術改良訓練班 點名記錄\n`;
        msg += `📅 日期：${displayDate}\n`;
        msg += `⏰ 時間：${timeVal}\n`;
        msg += `🏟️ 地點：${venue}\n`;
        msg += `🧑‍🏫 負責教練：${coach}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        
        // 運動員區塊
        msg += `👥 【運動員名單】\n`;
        for (let i = 0; i < athletesRaw.length; i++) {
            const p = athletesRaw[i];
            const statusVal = athleteStatus[i];
            const statusDisplay = getStatusEmojiAndText(statusVal);
            const genderShow = p.gender === 'M' ? '男' : (p.gender === 'F' ? '女' : p.gender);
            msg += `${i+1}. ${p.org}｜${p.name} (${genderShow}) → ${statusDisplay}\n`;
        }
        
        // 跟操運動員
        if(trialsRaw.length > 0){
            msg += `\n🏃 【跟操運動員】\n`;
            for (let i = 0; i < trialsRaw.length; i++) {
                const p = trialsRaw[i];
                const statusVal = trialStatus[i];
                const statusDisplay = getStatusEmojiAndText(statusVal);
                const genderShow = p.gender === 'M' ? '男' : (p.gender === 'F' ? '女' : p.gender);
                msg += `${i+1}. ${p.org}｜${p.name} (${genderShow}) → ${statusDisplay}\n`;
            }
        }
        
        // 融合伙伴
        if(partnersRaw.length > 0){
            msg += `\n🤝 【融合伙伴名單】\n`;
            for (let i = 0; i < partnersRaw.length; i++) {
                const p = partnersRaw[i];
                const statusVal = partnerStatus[i];
                const statusDisplay = getStatusEmojiAndText(statusVal);
                const genderShow = p.gender === 'M' ? '男' : (p.gender === 'F' ? '女' : p.gender);
                msg += `${i+1}. ${p.org}｜${p.name} (${genderShow}) → ${statusDisplay}\n`;
            }
        }
        
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        // 加上生成時間 (自動偵測當前時間)
        const now = new Date();
        const formattedTime = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        msg += `📎 此記錄由點名系統自動生成\n🕒 生成時間：${formattedTime}`;
        
        return msg;
    }
    
    // 更新預覽區域
    function updatePreview() {
        const previewDiv = document.getElementById('whatsappPreview');
        const text = generateWhatsAppText();
        previewDiv.innerText = text;
    }
    
    // 重置所有狀態為 "Yes" (出席)
    function resetAllStatus() {
        athleteStatus.fill("Yes");
        trialStatus.fill("Yes");
        partnerStatus.fill("Yes");
        renderTables();      // 重新渲染並綁定事件
        updatePreview();     // 同時更新預覽
    }
    
    // 傳送至WhatsApp (網頁版/手機端)
    function sendToWhatsApp() {
        const fullText = generateWhatsAppText();
        // 編碼URI
        const encodedMsg = encodeURIComponent(fullText);
        // WhatsApp 網址格式 https://wa.me/?text=xxx 適合手機或web
        window.open(`https://wa.me/?text=${encodedMsg}`, '_blank');
    }
    
    // 初始化事件監聽 + 渲染
    function init() {
        renderTables();
        updatePreview();
        
        // 監聽所有改變會影響文案的元件: 日期、時間、場地、教練，以及當下拉狀態改變時更新文案
        const dateInput = document.getElementById('sessionDate');
        const timeSelect = document.getElementById('sessionTime');
        const venueSelect = document.getElementById('venueSelect');
        const coachSelect = document.getElementById('coachSelect');
        
        const updateOnChange = () => updatePreview();
        dateInput.addEventListener('change', updateOnChange);
        timeSelect.addEventListener('change', updateOnChange);
        venueSelect.addEventListener('change', updateOnChange);
        coachSelect.addEventListener('change', updateOnChange);
        
        // 監聽所有表格狀態改變 (使用事件代理)
        document.body.addEventListener('change', (e) => {
            if(e.target && e.target.classList && e.target.classList.contains('status-select')){
                // 狀態變更時更新預覽
                updatePreview();
            }
        });
        
        // 重置按鈕
        const resetBtn = document.getElementById('resetDefaultBtn');
        resetBtn.addEventListener('click', () => {
            resetAllStatus();
        });
        
        // 生成文案按鈕 (重新顯示預覽)
        const generateBtn = document.getElementById('generateMsgBtn');
        generateBtn.addEventListener('click', () => {
            updatePreview();
            // 可附加小反饋
        });
        
        // whatsapp傳送按鈕
        const whatsappBtn = document.getElementById('whatsappSendBtn');
        whatsappBtn.addEventListener('click', () => {
            sendToWhatsApp();
        });
        
        // 確保初始預覽正確
        updatePreview();
    }
    
    // 啟動
    init();
</script>
</body>
</html>
