<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>軟式曲棍球技術改良訓練班 - 網上點名系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Noto Sans TC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 24px 32px;
        }
        /* 協會logo區塊 */
        .logo-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo svg {
            width: 56px;
            height: 56px;
        }
        .logo-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e3a5f;
            letter-spacing: 1px;
        }
        .title-area h1 {
            margin: 0;
            font-size: 1.7rem;
            color: #0b3b5f;
        }
        .title-area p {
            margin: 6px 0 0;
            color: #2c5282;
            font-weight: 500;
        }
        /* 控制列 */
        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 24px;
            margin: 20px 0;
            align-items: flex-end;
        }
        .ctrl-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .ctrl-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
        }
        select, input[type="date"] {
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        .btn {
            background: #1e6f3f;
            border: none;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn-whatsapp {
            background: #25D366;
        }
        .btn-whatsapp:hover {
            background: #128C7E;
        }
        .btn-secondary {
            background: #3b82f6;
        }
        .btn-secondary:hover {
            background: #2563eb;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.85rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        th {
            background: #eef2ff;
            padding: 12px 8px;
            border: 1px solid #cbd5e1;
            text-align: center;
            font-weight: 700;
            color: #1e293b;
        }
        td {
            border: 1px solid #cbd5e1;
            padding: 8px 6px;
            text-align: center;
            vertical-align: middle;
            background-color: #fff;
        }
        .section-header {
            background: #d9e6f5;
            font-weight: 800;
            font-size: 1rem;
        }
        select.status-select {
            padding: 5px 8px;
            border-radius: 32px;
            font-size: 0.8rem;
            background: white;
            width: 100%;
            min-width: 80px;
            cursor: pointer;
        }
        .footer-note {
            text-align: right;
            font-size: 0.75rem;
            color: #4b5563;
            margin-top: 16px;
            border-top: 1px solid #e2e8f0;
            padding-top: 14px;
        }
        .preview-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 16px 20px;
            margin-top: 24px;
            border: 1px solid #e2edf2;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .preview-content {
            background: white;
            border-radius: 16px;
            padding: 16px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.85rem;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #cbd5e1;
        }
        button {
            margin: 4px;
        }
        @media (max-width: 780px) {
            .container {
                padding: 16px;
            }
            th, td {
                font-size: 0.75rem;
                padding: 6px 3px;
            }
            .status-select {
                font-size: 0.7rem;
                padding: 4px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 中國香港智障人士體育協會 Logo (SVG示意) -->
    <div class="logo-area">
        <div class="logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#C8102E" stroke-width="3" fill="#FFE6E6"/>
                <path d="M50 20 L55 38 L74 38 L59 48 L65 66 L50 55 L35 66 L41 48 L26 38 L45 38 Z" fill="#F9A826" stroke="#C8102E" stroke-width="1.5"/>
                <text x="50" y="88" text-anchor="middle" font-size="10" fill="#1e3a5f" font-weight="bold">HKSAPID</text>
            </svg>
            <div class="logo-text">中國香港智障人士體育協會<br>軟式曲棍球技術改良班</div>
        </div>
        <div class="title-area">
            <h1>🏑 軟式曲棍球技術改良訓練班</h1>
            <p>星期一、六 (18:00-20:00) | 九龍灣體育館</p>
        </div>
    </div>

    <!-- 日期, 場地, 教練組合下拉式 -->
    <div class="controls-bar">
        <div class="ctrl-group">
            <label>📅 訓練日期</label>
            <input type="date" id="trainingDate" value="2026-03-27">
        </div>
        <div class="ctrl-group">
            <label>🏟️ 場地</label>
            <select id="venueSelect">
                <option value="九龍灣體育館" selected>九龍灣體育館</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>👨‍🏫 教練組合</label>
            <select id="coachSelect">
                <option value="彭家威、何昌恆">彭家威、何昌恆</option>
                <option value="彭家威">彭家威</option>
                <option value="何昌恆">何昌恆</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label> </label>
            <button id="refreshTableBtn" class="btn btn-secondary">🔄 更新點名表</button>
        </div>
    </div>

    <!-- 點名表格: 運動員 / 跟操運動員 / 融合夥伴 三個區塊 完整保留機構、性別欄位 -->
    <div style="overflow-x: auto;">
        <table id="attendanceTable">
            <thead>
                <tr><th>類別</th><th>機構名稱</th><th>姓名</th><th>性別</th><th>出席狀態</th></tr>
            </thead>
            <tbody id="tableBody">
                <!-- 動態由js產生 -->
            </tbody>
        </table>
    </div>

    <!-- 推送文案預覽 + WhatsApp 發送 -->
    <div class="preview-card">
        <div class="preview-header">
            <strong>📋 WhatsApp 推送文案預覽</strong>
            <div>
                <button id="generateWhatsAppBtn" class="btn btn-whatsapp">📲 生成文案並傳送至 WhatsApp</button>
            </div>
        </div>
        <div class="preview-content" id="whatsappPreview">
            點擊上方按鈕產生今日點名記錄...
        </div>
    </div>
    <div class="footer-note">
        此記錄由點名系統自動生成 · 文案生成時間：<span id="generateTimestamp">--</span>
    </div>
</div>

<script>
    // ---------- 定義原始數據 (運動員+跟操+融合夥伴) 全部包含機構 & 性別 ----------
    // 運動員名單 (1-13)
    const athletes = [
        { name: "羅翹鋒", org: "特奧之友", gender: "M" },
        { name: "陳卓謙", org: "松嶺職訓", gender: "M" },
        { name: "林日朗", org: "觀塘展亮", gender: "M" },
        { name: "李浩生", org: "循道衛理", gender: "M" },
        { name: "陳文輝", org: "特奧之友", gender: "M" },
        { name: "陳文傑", org: "特奧之友", gender: "M" },
        { name: "李穎駿", org: "特奧之友", gender: "M" },
        { name: "呂家華", org: "特奧之友", gender: "M" },
        { name: "林志忠", org: "特奧之友", gender: "M" },
        { name: "曹俊業", org: "特奧之友", gender: "M" },
        { name: "何子鵬", org: "特奧之友", gender: "M" },
        { name: "吳國浩", org: "沙田公立", gender: "M" },
        { name: "石振星", org: "西區晨輝", gender: "M" }
    ];

    // 跟操運動員名單 (14)
    const followers = [
        { name: "鄧梓謙", org: "啟愛", gender: "M" }
    ];

    // 融合夥伴名單 (16-20 有重複編號19但不同人，全部保留)
    const partners = [
        { name: "陳考熒", org: "融合伙伴", gender: "F" },
        { name: "麥偉俊", org: "融合伙伴", gender: "M" },
        { name: "陳芯儀", org: "融合伙伴", gender: "F" },
        { name: "江韻荍", org: "融合伙伴", gender: "F" },
        { name: "夏仲文", org: "融合伙伴", gender: "F" },   // 原始性別F
        { name: "黃展悅", org: "融合伙伴", gender: "F" }
    ];

    // 狀態定義 (文字 + 對應emoji) 用於顯示與儲存
    const statusMap = [
        { value: "Yes", label: "✅ Yes (出席)", emoji: "✅" },
        { value: "Abs", label: "📴 Abs (請假)", emoji: "📴" },
        { value: "O", label: "❌ O (無故缺席)", emoji: "❌" },
        { value: "L", label: "⏰ L (遲到)", emoji: "⏰" },
        { value: "S", label: "🤒 S (病假)", emoji: "🤒" },
        { value: "C", label: "🏆 C (出外比賽)", emoji: "🏆" }
    ];

    // 儲存每個人的狀態 (key: 類別_索引) 例如 athlete_0, follower_0, partner_0
    let stateStore = {};

    // 初始化狀態預設全部為 "Yes" (出席)
    function initStates() {
        stateStore = {};
        athletes.forEach((_, idx) => { stateStore[`athlete_${idx}`] = "Yes"; });
        followers.forEach((_, idx) => { stateStore[`follower_${idx}`] = "Yes"; });
        partners.forEach((_, idx) => { stateStore[`partner_${idx}`] = "Yes"; });
    }
    initStates();

    // 輔助: 取得狀態對應的顯示文字(含emoji)
    function getStatusDisplay(value) {
        const found = statusMap.find(s => s.value === value);
        if (found) return found.label;
        return "✅ Yes (出席)";
    }
    function getStatusEmoji(value) {
        const found = statusMap.find(s => s.value === value);
        return found ? found.emoji : "✅";
    }

    // 產生下拉式選單html (status下拉)
    function renderStatusSelect(itemKey, currentStatus) {
        let optionsHtml = "";
        for (let st of statusMap) {
            const selected = (st.value === currentStatus) ? "selected" : "";
            optionsHtml += `<option value="${st.value}" ${selected}>${st.label}</option>`;
        }
        return `<select class="status-select" data-key="${itemKey}">${optionsHtml}</select>`;
    }

    // 渲染整個表格
    function renderTable() {
        const tbody = document.getElementById("tableBody");
        if (!tbody) return;
        let html = "";

        // 1. 運動員區塊
        html += `<tr class="section-header"><td colspan="5"><strong>🏑 運動員名單</strong></td></tr>`;
        athletes.forEach((ath, idx) => {
            const key = `athlete_${idx}`;
            const statusVal = stateStore[key] || "Yes";
            html += `<tr>
                        <td>運動員</td>
                        <td>${escapeHtml(ath.org)}</td>
                        <td>${escapeHtml(ath.name)}</td>
                        <td>${ath.gender === 'M' ? '男' : '女'}</td>
                        <td>${renderStatusSelect(key, statusVal)}</td>
                     </tr>`;
        });

        // 2. 跟操運動員
        html += `<tr class="section-header"><td colspan="5"><strong>🏋️ 跟操運動員名單</strong></td></tr>`;
        followers.forEach((fol, idx) => {
            const key = `follower_${idx}`;
            const statusVal = stateStore[key] || "Yes";
            html += `<tr>
                        <td>跟操運動員</td>
                        <td>${escapeHtml(fol.org)}</td>
                        <td>${escapeHtml(fol.name)}</td>
                        <td>${fol.gender === 'M' ? '男' : '女'}</td>
                        <td>${renderStatusSelect(key, statusVal)}</td>
                     </tr>`;
        });

        // 3. 融合夥伴
        html += `<tr class="section-header"><td colspan="5"><strong>🤝 融合伙伴名單</strong></td></tr>`;
        partners.forEach((par, idx) => {
            const key = `partner_${idx}`;
            const statusVal = stateStore[key] || "Yes";
            html += `<tr>
                        <td>融合伙伴</td>
                        <td>${escapeHtml(par.org)}</td>
                        <td>${escapeHtml(par.name)}</td>
                        <td>${par.gender === 'M' ? '男' : '女'}</td>
                        <td>${renderStatusSelect(key, statusVal)}</td>
                     </tr>`;
        });

        tbody.innerHTML = html;

        // 綁定所有下拉選單的 change 事件
        document.querySelectorAll('.status-select').forEach(select => {
            select.addEventListener('change', (e) => {
                const key = select.getAttribute('data-key');
                if (key && stateStore.hasOwnProperty(key)) {
                    stateStore[key] = select.value;
                }
                // 也可以即時重新生成預覽文案，但文案生成獨立按鈕呼叫，為免頻繁渲染可保留。但為了即時更新預覽，可以再呼叫refreshPreview，但我們讓按鈕生成文案時抓最新狀態即可。
            });
        });
    }

    // 簡單防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 產生WhatsApp文案 (整齊分類，包含機構/性別/狀態emoji)
    function generateWhatsAppText() {
        const dateInput = document.getElementById("trainingDate").value;
        const formattedDate = dateInput ? new Date(dateInput).toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric' }) : dateInput;
        const venue = document.getElementById("venueSelect").value;
        const coachCombo = document.getElementById("coachSelect").value;
        const now = new Date();
        const timestampStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        document.getElementById("generateTimestamp").innerText = timestampStr;

        let lines = [];
        lines.push(`🏑 軟式曲棍球技術改良訓練班 點名記錄`);
        lines.push(`📅 日期：${formattedDate}`);
        lines.push(`⏰ 時間：星期一、六 (18:00-20:00)`);
        lines.push(`🏟️ 地點：${venue}`);
        lines.push(`👨‍🏫 負責教練：${coachCombo}`);
        lines.push(``);
        
        // 運動員列表
        lines.push(`【🏑 運動員名單】`);
        athletes.forEach((ath, idx) => {
            const key = `athlete_${idx}`;
            const statusVal = stateStore[key] || "Yes";
            const emoji = getStatusEmoji(statusVal);
            const statusLabel = statusMap.find(s => s.value === statusVal)?.label.split(' ')[1] || statusVal;
            lines.push(`▪ ${ath.org}｜${ath.name} (${ath.gender === 'M' ? '男' : '女'}) 狀態：${emoji} ${statusLabel}`);
        });
        lines.push(``);
        lines.push(`【🏋️ 跟操運動員名單】`);
        followers.forEach((fol, idx) => {
            const key = `follower_${idx}`;
            const statusVal = stateStore[key] || "Yes";
            const emoji = getStatusEmoji(statusVal);
            const statusLabel = statusMap.find(s => s.value === statusVal)?.label.split(' ')[1] || statusVal;
            lines.push(`▪ ${fol.org}｜${fol.name} (${fol.gender === 'M' ? '男' : '女'}) 狀態：${emoji} ${statusLabel}`);
        });
        lines.push(``);
        lines.push(`【🤝 融合伙伴名單】`);
        partners.forEach((par, idx) => {
            const key = `partner_${idx}`;
            const statusVal = stateStore[key] || "Yes";
            const emoji = getStatusEmoji(statusVal);
            const statusLabel = statusMap.find(s => s.value === statusVal)?.label.split(' ')[1] || statusVal;
            lines.push(`▪ ${par.org}｜${par.name} (${par.gender === 'M' ? '男' : '女'}) 狀態：${emoji} ${statusLabel}`);
        });
        lines.push(``);
        lines.push(`📌 此記錄由點名系統自動生成`);
        lines.push(`⏱️ 文案生成時間：${timestampStr}`);
        return lines.join("\n");
    }

    // 更新預覽區塊
    function updatePreview() {
        const previewDiv = document.getElementById("whatsappPreview");
        if (previewDiv) {
            previewDiv.innerText = generateWhatsAppText();
        }
    }

    // 推送至WhatsApp (web)
    function sendToWhatsApp() {
        const text = generateWhatsAppText();
        const encoded = encodeURIComponent(text);
        // 使用 WhatsApp 的通用連結（手機會自動開啟 WhatsApp，桌面版可能需web）
        window.open(`https://wa.me/?text=${encoded}`, '_blank');
    }

    // 重新整理表格 & 儲存當前所有下拉值到stateStore (確保下拉變更已更新)
    function syncStateFromSelects() {
        // 抓取所有目前頁面上下拉選單的值，同步至stateStore
        const selects = document.querySelectorAll('.status-select');
        selects.forEach(select => {
            const key = select.getAttribute('data-key');
            if (key && stateStore.hasOwnProperty(key)) {
                stateStore[key] = select.value;
            }
        });
    }

    function refreshAll() {
        syncStateFromSelects();  // 確保舊狀態保留
        renderTable();           // 重新繪製表格 (保留剛同步的stateStore)
        updatePreview();         // 更新文案預覽
    }

    // 綁定更新按鈕
    document.getElementById("refreshTableBtn")?.addEventListener("click", () => {
        refreshAll();
    });

    // 生成文案並傳送至WhatsApp 按鈕
    document.getElementById("generateWhatsAppBtn")?.addEventListener("click", () => {
        syncStateFromSelects();   // 最新下拉狀態寫入store
        updatePreview();          // 產生最新文案至預覽區
        sendToWhatsApp();         // 觸發whatsapp
    });

    // 另外當日期場地教練變更時，可以讓預覽更新，但不影響表格 (文案包含這些資料)
    function bindMetaUpdates() {
        const datePick = document.getElementById("trainingDate");
        const venueSel = document.getElementById("venueSelect");
        const coachSel = document.getElementById("coachSelect");
        const updateMetaPreview = () => updatePreview();
        datePick.addEventListener("change", updateMetaPreview);
        venueSel.addEventListener("change", updateMetaPreview);
        coachSel.addEventListener("change", updateMetaPreview);
    }

    // 初始渲染
    function init() {
        renderTable();
        bindMetaUpdates();
        updatePreview();
        // 設定日期預設今天 + 生成時間初始顯示
        const now = new Date();
        if (!document.getElementById("trainingDate").value) {
            document.getElementById("trainingDate").valueAsDate = now;
        }
        document.getElementById("generateTimestamp").innerText = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    }
    init();
</script>
</body>
</html>
