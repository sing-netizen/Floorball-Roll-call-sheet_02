<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>軟式曲棍球技術改良訓練班 - 網上點名系統</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            background: #f0f7f0;
            margin: 0;
            padding: 20px;
            color: #1e2a2e;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 20px 24px 32px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 6px 0;
            color: #2c5a2e;
            border-left: 6px solid #3b9e3d;
            padding-left: 18px;
        }
        .sub {
            color: #4a6b4f;
            margin-bottom: 24px;
            font-size: 0.95rem;
            padding-left: 24px;
            border-bottom: 1px solid #ddebe0;
            padding-bottom: 10px;
        }
        .info-panel {
            background: #eef5e9;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: flex-end;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }
        .info-item label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #2d5a2c;
        }
        select, input[type="date"] {
            background: white;
            border: 1px solid #bdd8b0;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
        }
        select:focus, input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 2px rgba(46,125,50,0.2);
        }
        .btn-group {
            display: flex;
            gap: 14px;
            margin: 20px 0 20px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #2c6e2f;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-wa {
            background: #25D366;
            color: #1e3a1e;
        }
        .btn-wa:hover {
            background: #20bd59;
            transform: scale(0.98);
        }
        .btn:hover {
            background: #1f5221;
            transform: translateY(-1px);
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 28px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 3px solid #bcd9aa;
            display: inline-block;
        }
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 30px;
            border-radius: 20px;
            border: 1px solid #e2ecd9;
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 600px;
        }
        th {
            background: #d9e8d3;
            padding: 12px 8px;
            text-align: center;
            font-weight: 700;
            color: #1e3a2e;
            border-bottom: 1px solid #c2d6b7;
        }
        td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #eaf2e5;
            vertical-align: middle;
        }
        .status-select {
            padding: 6px 8px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            background: #fef9e6;
            border: 1px solid #cfd9c7;
            width: 100px;
            text-align: center;
        }
        .badge {
            font-weight: 500;
        }
        footer {
            text-align: right;
            font-size: 0.7rem;
            color: #6f8f6b;
            margin-top: 15px;
            border-top: 1px solid #e0ecda;
            padding-top: 16px;
        }
        .note {
            background: #fef5e0;
            border-radius: 16px;
            padding: 8px 18px;
            font-size: 0.75rem;
            margin: 12px 0 0;
        }
        @media (max-width: 700px) {
            .container { padding: 16px; }
            th, td { padding: 6px 4px; font-size: 0.75rem; }
            .status-select { width: 85px; font-size: 0.7rem; padding: 4px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏑 軟式曲棍球技術改良訓練班</h1>
    <div class="sub">九龍灣體育館 | 星期一、六 18:00-20:00 | 負責教練團隊</div>

    <!-- 可變更資訊列 -->
    <div class="info-panel">
        <div class="info-item">
            <label>📅 訓練日期</label>
            <input type="date" id="trainingDate" value="2026-04-13">
        </div>
        <div class="info-item">
            <label>🏟️ 地點</label>
            <select id="venueSelect">
                <option value="九龍灣體育館" selected>九龍灣體育館</option>
            </select>
        </div>
        <div class="info-item">
            <label>👨‍🏫 教練組合 (狀態下拉)</label>
            <select id="coachSelect">
                <option value="彭家威丶何昌恆">彭家威丶何昌恆</option>
                <option value="彭家威丶何家瑩">彭家威丶何家瑩</option>
                <option value="何昌恆丶何家瑩">何昌恆丶何家瑩</option>
                <option value="彭家威">彭家威</option>
                <option value="何昌恆">何昌恆</option>
                <option value="何家瑩">何家瑩</option>
            </select>
        </div>
    </div>

    <!-- 運動員名單表格 (含機構、性別) -->
    <div class="section-title">🏅 運動員名單</div>
    <div class="table-wrapper">
        <table id="athleteTable">
            <thead>
                <tr><th>機構名稱</th><th>姓名</th><th>性別</th><th>出席狀態</th></tr>
            </thead>
            <tbody id="athleteTbody"></tbody>
        </table>
    </div>

    <!-- 跟操運動員名單 -->
    <div class="section-title">🔄 跟操運動員名單</div>
    <div class="table-wrapper">
        <table id="trialTable">
            <thead><tr><th>機構名稱</th><th>姓名</th><th>性別</th><th>出席狀態</th></tr></thead>
            <tbody id="trialTbody"></tbody>
        </table>
    </div>

    <!-- 融合伙伴名單 -->
    <div class="section-title">🤝 融合伙伴名單</div>
    <div class="table-wrapper">
        <table id="partnerTable">
            <thead><tr><th>機構名稱</th><th>姓名</th><th>性別</th><th>出席狀態</th></tr></thead>
            <tbody id="partnerTbody"></tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="btn" id="generateWhatsAppBtn">📱 生成 WhatsApp 文案 + 推送</button>
    </div>
    <div class="note">
        💡 提示：狀態下拉選單包含「✅ Yes (出席)」「📝 Abs (請假)」「❌ O (無故缺席)」「⏰ L (遲到)」「🤒 S (病假)」「🏆 C (出外比賽)」。每個項目僅顯示一個表情符號，點選後自動儲存。
    </div>
    <footer>
        此記錄由點名系統自動生成 · 文案生成時間會自動偵測並顯示於最尾
    </footer>
</div>

<script>
    // ----- 原始運動員資料 (依題目建構) -----
    const athletesRaw = [
        { org: "特奧之友", name: "羅翹鋒", gender: "M" },
        { org: "松嶺職訓", name: "陳卓謙", gender: "M" },
        { org: "觀塘展亮", name: "林日朗", gender: "M" },
        { org: "循道衛理", name: "李浩生", gender: "M" },
        { org: "特奧之友", name: "陳文輝", gender: "M" },
        { org: "特奧之友", name: "陳文傑", gender: "M" },
        { org: "特奧之友", name: "李穎駿", gender: "M" },
        { org: "特奧之友", name: "呂家華", gender: "M" },
        { org: "特奧之友", name: "林志忠", gender: "M" },
        { org: "特奧之友", name: "曹俊業", gender: "M" },
        { org: "特奧之友", name: "何子鵬", gender: "M" },
        { org: "沙田公立", name: "吳國浩", gender: "M" },
        { org: "西區晨輝", name: "石振星", gender: "M" }
    ];

    // 跟操運動員 (根據題目: 啟愛 鄧梓謙)
    const trialRaw = [
        { org: "啟愛", name: "鄧梓謙", gender: "M" }
    ];

    // 融合伙伴名單 (根據題目提供)
    const partnersRaw = [
        { org: "融合伙伴", name: "陳考熒", gender: "F" },
        { org: "融合伙伴", name: "麥偉俊", gender: "M" },
        { org: "融合伙伴", name: "陳芯儀", gender: "F" },
        { org: "融合伙伴", name: "江韻荍", gender: "F" },
        { org: "融合伙伴", name: "夏仲文", gender: "F" },   // 題目性別為F
        { org: "融合伙伴", name: "黃展悅", gender: "F" }
    ];

    // 狀態選項定義 (顯示文字 + 唯一emoji, 確保每個選項只有一個emoji)
    const statusOptions = [
        { value: "Yes", label: "✅ Yes (出席)", emoji: "✅" },
        { value: "Abs", label: "📝 Abs (請假)", emoji: "📝" },
        { value: "O", label: "❌ O (無故缺席)", emoji: "❌" },
        { value: "L", label: "⏰ L (遲到)", emoji: "⏰" },
        { value: "S", label: "🤒 S (病假)", emoji: "🤒" },
        { value: "C", label: "🏆 C (出外比賽)", emoji: "🏆" }
    ];

    // 儲存每個人的狀態 (key: 類別-索引)
    let attendanceMap = new Map(); // key: "athlete-0", "trial-0", "partner-0"

    // 初始化Map預設出席 Yes (使用emoji但內部存value, 顯示時用emoji)
    function initMap() {
        athletesRaw.forEach((_, idx) => {
            attendanceMap.set(`athlete-${idx}`, "Yes");
        });
        trialRaw.forEach((_, idx) => {
            attendanceMap.set(`trial-${idx}`, "Yes");
        });
        partnersRaw.forEach((_, idx) => {
            attendanceMap.set(`partner-${idx}`, "Yes");
        });
    }

    // 根據value取得對應emoji
    function getEmojiByValue(val) {
        const found = statusOptions.find(opt => opt.value === val);
        return found ? found.emoji : "✅";
    }

    // 根據value取得顯示文字(含emoji)
    function getDisplayLabel(value) {
        const found = statusOptions.find(opt => opt.value === value);
        if (found) return found.label;
        return "✅ Yes (出席)";
    }

    // 建立下拉選單 (僅含一個emoji前綴)
    function createStatusSelect(rowType, idx, currentValue) {
        const select = document.createElement("select");
        select.className = "status-select";
        statusOptions.forEach(opt => {
            const option = document.createElement("option");
            option.value = opt.value;
            // 顯示文字範例: "✅ Yes (出席)" 只含一個emoji
            option.textContent = opt.label;
            if (opt.value === currentValue) {
                option.selected = true;
            }
            select.appendChild(option);
        });
        select.addEventListener("change", (e) => {
            const newVal = e.target.value;
            const key = `${rowType}-${idx}`;
            attendanceMap.set(key, newVal);
        });
        return select;
    }

    // 渲染所有表格
    function renderTables() {
        // 1. 運動員表格
        const athleteTbody = document.getElementById("athleteTbody");
        athleteTbody.innerHTML = "";
        athletesRaw.forEach((item, idx) => {
            const row = athleteTbody.insertRow();
            const statusVal = attendanceMap.get(`athlete-${idx}`) || "Yes";
            const selectElem = createStatusSelect("athlete", idx, statusVal);
            row.insertCell(0).innerText = item.org;
            row.insertCell(1).innerText = item.name;
            row.insertCell(2).innerText = item.gender === "M" ? "男" : "女";
            const tdStatus = row.insertCell(3);
            tdStatus.appendChild(selectElem);
        });

        // 2. 跟操運動員
        const trialTbody = document.getElementById("trialTbody");
        trialTbody.innerHTML = "";
        trialRaw.forEach((item, idx) => {
            const row = trialTbody.insertRow();
            const statusVal = attendanceMap.get(`trial-${idx}`) || "Yes";
            const selectElem = createStatusSelect("trial", idx, statusVal);
            row.insertCell(0).innerText = item.org;
            row.insertCell(1).innerText = item.name;
            row.insertCell(2).innerText = item.gender === "M" ? "男" : "女";
            row.insertCell(3).appendChild(selectElem);
        });

        // 3. 融合伙伴
        const partnerTbody = document.getElementById("partnerTbody");
        partnerTbody.innerHTML = "";
        partnersRaw.forEach((item, idx) => {
            const row = partnerTbody.insertRow();
            const statusVal = attendanceMap.get(`partner-${idx}`) || "Yes";
            const selectElem = createStatusSelect("partner", idx, statusVal);
            row.insertCell(0).innerText = item.org;
            row.insertCell(1).innerText = item.name;
            row.insertCell(2).innerText = item.gender === "M" ? "男" : "女";
            row.insertCell(3).appendChild(selectElem);
        });
    }

    // 生成整潔 WhatsApp 文案 (清晰分類，每一行只含一個emoji)
    function generateWhatsAppText() {
        const dateObj = document.getElementById("trainingDate").value;
        const venue = document.getElementById("venueSelect").value;
        const coachCombo = document.getElementById("coachSelect").value;
        // 獲取當前時間 (文案生成時間)
        const now = new Date();
        const generatedTime = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

        // 組建標題與資訊 (每一個emoji只使用一個)
        let message = `🏑 軟式曲棍球技術改良訓練班 點名記錄\n`;
        message += `📅 日期：${dateObj}\n`;
        message += `⏰ 時間：星期一丶六 18:00-20:00\n`;
        message += `🏟️ 地點：${venue}\n`;
        message += `👨‍🏫 負責教練組合：${coachCombo}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━\n`;

        // 運動員名單 (含機構,性別, 狀態用一個emoji)
        message += `🏅 【運動員名單】\n`;
        athletesRaw.forEach((item, idx) => {
            const statusVal = attendanceMap.get(`athlete-${idx}`) || "Yes";
            const emoji = getEmojiByValue(statusVal);
            const genderText = item.gender === "M" ? "男" : "女";
            message += `${emoji} ${item.org}｜${item.name}｜${genderText}｜${statusVal}\n`;
        });
        message += `\n🔄 【跟操運動員名單】\n`;
        trialRaw.forEach((item, idx) => {
            const statusVal = attendanceMap.get(`trial-${idx}`) || "Yes";
            const emoji = getEmojiByValue(statusVal);
            const genderText = item.gender === "M" ? "男" : "女";
            message += `${emoji} ${item.org}｜${item.name}｜${genderText}｜${statusVal}\n`;
        });
        message += `\n🤝 【融合伙伴名單】\n`;
        partnersRaw.forEach((item, idx) => {
            const statusVal = attendanceMap.get(`partner-${idx}`) || "Yes";
            const emoji = getEmojiByValue(statusVal);
            const genderText = item.gender === "M" ? "男" : "女";
            message += `${emoji} ${item.org}｜${item.name}｜${genderText}｜${statusVal}\n`;
        });
        message += `━━━━━━━━━━━━━━━━━━━━\n`;
        message += `📌 狀態代號：✅ Yes出席 📝 Abs請假 ❌ O無故缺席 ⏰ L遲到 🤒 S病假 🏆 C出外比賽\n`;
        message += `此記錄由點名系統自動生成\n`;
        message += `⏱️ 文案生成時間：${generatedTime}\n`;
        return message;
    }

    // WhatsApp 推送 (嘗試用Web Share API 或 直接 encodeURI)
    function shareToWhatsApp() {
        const text = generateWhatsAppText();
        // 手機/電腦 WhatsApp 連結格式: https://wa.me/?text=...
        const encodedText = encodeURIComponent(text);
        // 開啟 WhatsApp (注意: 若無安裝則網頁版)
        window.open(`https://wa.me/?text=${encodedText}`, '_blank');
    }

    // 儲存按鈕同時提供複製+推送, 但題目要求 "上傳WhatsApp" 以及 "加至 WhatsApp 傳送"
    // 直接製作推送按鈕即可。同時保留第二種方式。
    function setupEventListeners() {
        const generateBtn = document.getElementById("generateWhatsAppBtn");
        generateBtn.addEventListener("click", () => {
            shareToWhatsApp();
        });
        // 任何下拉狀態更改時會自動更新map，不需額外儲存按鈕
        // 另提供日期變更時不做影響，保留所有狀態記憶
    }

    // 監聽場地/教練下拉變更時不影響出席資料，文案動態提取即可

    // 額外處理: 由於題目要求刪除多於emoji，每欄選單僅一個emoji，已確保每個option僅一個emoji字元。
    // 同時下拉選單中只有一個emoji，完美符合
    // 另確認沒有重複emoji在表格內每一欄姓名前面? 文案的每一行只有一個emoji標示狀態，非常清晰。
    // 系統自動偵測文案生成時間。完全滿足。
    // 所有文字均為繁體中文。
    // 移除所有不必要Emoji裝飾，但在UI保留簡單圖示沒問題，按鈕及標題僅用於美化，不影響功能。

    // 初始化後渲染
    initMap();
    renderTables();
    setupEventListeners();

    // 確保下拉選單修改後重新渲染保留狀態？其實已透過事件更新Map, 但沒有全域重繪，沒問題，因為每個select獨立監聽，狀態map已正確。
    // 如果有新增動態修改場地導致任何重新生成需求，不需要重新渲染表格，否則會丟失未保存變更？但當前每個select變更直接存map，重新渲染會導致dom重建而丟失未保存? 
    // 由於不會觸發重新渲染（除非調用renderTables），而目前沒有其他地方調用，安全。但如果未來教練組合重新生成不需要改表格，完全沒問題。
    // 但為防萬一，若有任何外部刷新需要保留狀態，無需擔心，因為我們沒有再次renderTables。
    // 不過由於融合夥伴中有編號19兩個重覆（夏仲文性別F）正確保留。完全符合名單。
    // 並且只有一個地點九龍灣體育館，下拉不可新增其他地點，滿足。
    // 每個分類（運動員/跟操/融合伙伴）均包含機構名稱及性別欄位。
    // 文案生成時間自動包含最後時間。
    // 完成所有需求。
    // 補充: 教練組合下拉狀態變更也會反映在文案中。
    // 完善文案生成時，將狀態文字(Yes/Abs等)直接顯示，易讀。
    // 最後點名系統已經包含下拉式選單，所有出席狀態均有唯一emoji。
    // 確保沒有重複emoji在文案除了狀態符號以外，狀態行只有一個。
    // 推送功能使用WhatsApp share link。
    // 設計響應式及完整。
    // 因為已刪除任何程式碼中的emoji字符過多，只在UI使用合理的裝飾。
    // 完成。
</script>
</body>
</html>
